<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#09090D"/>
  
  <!-- Geometric "A" -->
  <g>
    <!-- Triangle -->
    <polygon points="10,48 20,16 30,48" fill="none" stroke="#E6C371" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Horizontal bar -->
    <line x1="14" y1="34" x2="26" y2="34" stroke="#E6C371" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Geometric "D" -->
  <g>
    <!-- Vertical line -->
    <line x1="36" y1="16" x2="36" y2="48" stroke="#E6C371" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Rounded right side -->
    <path d="M 36 16 Q 48 16 48 32 Q 48 48 36 48" fill="none" stroke="#E6C371" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
